services:
  neo4j:
    image: neo4j:2026.01.4
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - service_network
  redis:
    image: redis:7.0.11
    restart: always
    ports:
      - "6379:6379"
    networks:
      - service_network


networks:
  service_network:
    driver: bridge

volumes:
    neo4j_data: